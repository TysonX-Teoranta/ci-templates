# domains.yml — CICD v2 central domain registry (contract C178289477824693).
#
# One entry per product repo. The bash spine (cicd/checks.sh via cicd/lib/common.sh)
# reads this file to run the SAME deterministic, zero-AI gate across every domain
# without per-repo copies drifting apart. Keep it to flat 2-space-indented scalar
# fields under each domain so the awk reader in common.sh can parse it (no yq needed).
#
# Fields:
#   repo         org/name of the product repository
#   solution     .sln in the repo (reference; the gate builds app_project, not the sln)
#   app_project  entry .csproj the gate compiles (transitive refs only) ("" = TBD)
#   app_dirs     space-separated app (non-test) source roots — diff-scope filter +
#                comment-density sweep; tests are excluded from zero-tolerance ("" = TBD)
#   dev_base     git ref the diff-scope gate compares against ("" = TBD)
#   status       active | on-hold | stub  (advisory; gate skips non-active by default)
#   test_project test .csproj run at RC finalisation ("" / absent = skip tests at cut)
#   hygiene      "required" = the repo MUST ship .github/scripts/ci/rc-hygiene.sh
#                (scrub|source|publish contract) or rc-finalise refuses to cut
#   rid          publish runtime identifier for the RC artifact (default linux-x64)
#   db_project   .csproj holding the EF migrations — rc-finalise cuts a self-contained
#                migrations bundle release asset from it (absent = domain has no
#                staging/live DB schema to ship; the receiver's DB legs auto-skip)
#   db_context   DbContext for the bundle (absent = the project's single context)
#
# The gate does NOT store where each repo is checked out — that is environment-specific.
# Point it at the product working tree with `checks.sh --repo-root <path>` (or the
# CICD_REPO_ROOT env). The gate never guesses a path.

version: 1

domains:
  lodgers:
    repo: TysonX-Teoranta/lodgers
    solution: lodgers.sln
    app_project: LodgersSite/LodgersSite.csproj
    app_dirs: "LodgersSite LodgersSite.Client LodgersSite.Shared"
    dev_base: origin/lodgers-dev
    status: active
    test_project: LodgersSite.NUnit.Tests/LodgersSite.NUnit.Tests.csproj
    hygiene: required
    rid: linux-x64
    db_project: LodgersSite/LodgersSite.csproj
    db_context: ApplicationDbContext
  kukuln:
    # Product launch is on hold; the CICD dev + RC lanes are active (parity with
    # lodgers, Crom order 2026-07-07) so the repo stays gate-proven and cuttable.
    repo: TysonX-Teoranta/kukuln
    solution: Kukuln.slnx
    app_project: src/KukulnSite/KukulnSite.csproj
    app_dirs: "src"
    dev_base: origin/kukuln-dev
    status: active
    test_project: Kukuln.slnx
    hygiene: required
    rid: linux-x64
  tysonx:
    repo: TysonX-Teoranta/tysonx
    solution: Tysonx.slnx
    app_project: src/TysonxSite/TysonxSite.csproj
    app_dirs: "src"
    dev_base: origin/tysonx-dev
    status: active
    test_project: tests/TysonxSite.Tests/TysonxSite.Tests.csproj
    hygiene: required
    rid: linux-x64
  tysonx-core:
    # pulseai's own repo. No-dotnet domain: app_project stays empty on purpose —
    # the gate skips the build/analyzer pass and hard-gates everything else
    # (.sh shellcheck, .json/.xml/.yml validity+hygiene, .md fences) so pulseai
    # output MUST pass CICD before it reaches Crom. .github is in app_dirs so
    # edits to the repo's own caller workflows are gated, not silently in-scope-free.
    repo: TysonX-Teoranta/tysonx-core
    solution: ""
    app_project: ""
    app_dirs: ".github agents ai-command dev live ops to-laptop"
    dev_base: origin/main
    status: active
  ci-templates:
    # The CICD spine itself. No-dotnet domain: the gate it ships gates its own
    # changes (.sh shellcheck, .yml/.json/.md hygiene) — a bad edit here instantly
    # governs every caller repo, so it gets the same dev-grade gate as the rest.
    # NB root-level files (this registry, README) sit outside app_dirs and the
    # diff filter — registry edits ride review, not the lint gate.
    repo: TysonX-Teoranta/ci-templates
    solution: ""
    app_project: ""
    app_dirs: "cicd .github"
    dev_base: origin/main
    status: active
