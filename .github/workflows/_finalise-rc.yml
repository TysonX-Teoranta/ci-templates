# _finalise-rc.yml — reusable RC finalisation (artifact model).
# THIN YAML over the FAT bash spine: all cut logic (version calc, scrub, hygiene,
# build/test/publish, package, tag + prerelease) lives in cicd/rc/rc-finalise.sh,
# driven by the central domains.yml registry. Zero AI at runtime.
#
# Dev is the only workbench: the artifact is built ONCE here on the dev runner;
# staging/live only ever receive it. The notify job (pulse runner, mail stack)
# sends the single "RC finalised" mail — an essential per the email policy.
name: _finalise-rc
on:
  workflow_call:
    inputs:
      domain:
        description: "domains.yml key (must be status: active)"
        required: true
        type: string
      bump:
        description: "rc | patch | minor | major"
        required: false
        type: string
        default: rc
      dry_run:
        description: "build + prove hygiene only; no tag, no release, no mail"
        required: false
        type: boolean
        default: false
      runner_label:
        description: "build runner label (the domain's dev box)"
        required: false
        type: string
        default: tysonx-dev
      pulse_runner_label:
        description: "pulse runner label (mail stack lives there)"
        required: false
        type: string
        default: tysonx-pulse

jobs:
  finalise:
    name: Finalise RC (scrub + hygiene + build-once artifact)
    runs-on: [self-hosted, "${{ inputs.runner_label }}"]
    timeout-minutes: 60
    permissions:
      contents: write   # RC tag push + prerelease create
    outputs:
      rc_tag: ${{ steps.cut.outputs.rc_tag }}
      version: ${{ steps.cut.outputs.version }}
      artifact: ${{ steps.cut.outputs.artifact }}
    steps:
      - name: Verify authorized actor
        if: github.actor != 'lodgings-ie'
        run: exit 1

      - name: Checkout product repo (full history + tags for version lineage)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout ci-templates spine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: TysonX-Teoranta/ci-templates
          ref: main
          path: .ci-templates

      - name: Cut RC (rc-finalise.sh — fat spine)
        id: cut
        env:
          DOMAIN: ${{ inputs.domain }}
          BUMP: ${{ inputs.bump }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          GH_TOKEN: ${{ github.token }}
          # Per-run NuGet cache — MSB3030 concurrency fix, same as the old rc-cut lane.
          NUGET_PACKAGES: ${{ runner.temp }}/nuget-${{ github.run_id }}
        run: |
          chmod +x .ci-templates/cicd/rc/rc-finalise.sh .ci-templates/cicd/lib/*.sh
          CICD_REGISTRY=.ci-templates/domains.yml .ci-templates/cicd/rc/rc-finalise.sh

  notify:
    name: RC finalised notice (essential mail + close the refusal loop)
    needs: finalise
    if: ${{ success() && !inputs.dry_run }}
    runs-on: [self-hosted, "${{ inputs.pulse_runner_label }}"]
    timeout-minutes: 5
    permissions:
      issues: write   # a clean cut closes any open rc-refusal loop issue
    steps:
      - name: Close any open rc-refusal loop issue (cut is clean — loop complete)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.finalise.outputs.rc_tag }}
          DOMAIN: ${{ inputs.domain }}
        run: |
          gh issue list -R "$REPO" --label rc-refusal --state open --json number -q '.[].number' 2>/dev/null \
            | while read -r n; do
                [ -n "$n" ] || continue
                gh issue close "$n" -R "$REPO" --reason completed \
                  --comment "Resolved — candidate $TAG cut clean (scrubbed, zero-stub, hygiene-proven)."
              done
          rm -f "$HOME/crom-queue/pending/RC-DECISION-$DOMAIN.md"
      - name: Send one mail via pulse sendmail
        env:
          DOMAIN: ${{ inputs.domain }}
          TAG: ${{ needs.finalise.outputs.rc_tag }}
        run: |
          {
            printf 'To: crom@tysonx.ie\n'
            printf 'From: crom@tysonx.ie\n'
            printf 'Auto-Submitted: auto-generated\n'
            printf 'Subject: [RC] %s %s finalised — ready for staging promote\n\n' "$DOMAIN" "$TAG"
            printf 'RC %s for %s is cut: live-ready by construction (scrubbed, zero-stub, hygiene-proven).\n' "$TAG" "$DOMAIN"
            printf 'This is the ONE open candidate for %s. Promote when ready:\n' "$DOMAIN"
            printf '  cicd promote %s staging --real --go        (opens your TOTP gate)\n' "$DOMAIN"
          } | /usr/sbin/sendmail -f crom@tysonx.ie -t

  refused:
    # RC LOOP, not a waterfall (Crom, 2026-07-05): a refusal loops the reasons back
    # into the dev workbench as ONE open 'rc-refusal' issue on the product repo.
    # Dev PRs fix + close it; the repo's rc-reloop workflow then re-orders the cut
    # automatically. A clean cut auto-closes any leftover refusal issue (notify job).
    name: RC refused — loop reasons back to dev as an issue (+ essential mail)
    needs: finalise
    if: ${{ failure() && !inputs.dry_run }}
    runs-on: [self-hosted, "${{ inputs.pulse_runner_label }}"]
    timeout-minutes: 5
    permissions:
      actions: read   # pull the failed job's log to extract the gate errors
      issues: write   # file/refresh the rc-refusal loop issue
    steps:
      - name: Extract gate errors → rc-refusal issue → one mail via pulse sendmail
        env:
          DOMAIN: ${{ inputs.domain }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          REASONS=$(gh run view "$RUN_ID" -R "$REPO" --log-failed 2>/dev/null \
            | grep -o '##\[error\].*' | sed 's/##\[error\]//' | awk '!seen[$0]++' | head -20)
          [ -n "$REASONS" ] || REASONS='(could not extract gate errors — read the run log)'

          gh label create rc-refusal -R "$REPO" \
            --description 'RC finalise refused — fix on dev, closing this issue re-orders the cut' \
            --color B60205 2>/dev/null || true
          BODY_FILE=$(mktemp)
          {
            printf 'RC finalise for **%s** was refused by the hygiene gates. No candidate was cut; the slot is unchanged.\n\n' "$DOMAIN"
            printf '## Gate errors (fix each on `%s-dev` via normal dev PRs)\n\n' "$DOMAIN"
            printf '%s\n' "$REASONS" | while IFS= read -r l; do [ -n "$l" ] && printf -- '- [ ] %s\n' "$l"; done
            printf '\nRun: %s\n\n' "$RUN_URL"
            printf '**The loop:** land the fixes on `%s-dev` (reference this issue), then CLOSE this issue as completed — closing it automatically re-orders the RC cut. A clean cut closes it for you and mails the finalised notice.\n' "$DOMAIN"
          } > "$BODY_FILE"
          NUM=$(gh issue list -R "$REPO" --label rc-refusal --state open --json number -q '.[0].number' 2>/dev/null)
          if [ -n "$NUM" ]; then
            gh issue edit "$NUM" -R "$REPO" --body-file "$BODY_FILE" \
              --title "[RC refused] $DOMAIN — hygiene gates blocked the cut"
            gh issue comment "$NUM" -R "$REPO" --body "Refused again — reasons refreshed above. Run: $RUN_URL"
            ISSUE_URL=$(gh issue view "$NUM" -R "$REPO" --json url -q .url)
          else
            ISSUE_URL=$(gh issue create -R "$REPO" --label rc-refusal \
              --title "[RC refused] $DOMAIN — hygiene gates blocked the cut" \
              --body-file "$BODY_FILE")
            NUM="${ISSUE_URL##*/}"
          fi
          rm -f "$BODY_FILE"

          # Unresolvable-by-dev refusals — a gate that declares 'no clearance path'
          # (e.g. zero-stub: implement the real feature or pull it from the RC) is a
          # PRODUCT decision. Elevate: label the loop issue + drop a card into Crom's
          # decisions queue (this job runs on pulse, so the write is local). A clean
          # cut clears the card; deciding = fix on dev, then close the loop issue.
          if printf '%s' "$REASONS" | grep -qi 'no clearance path'; then
            gh label create crom-decision -R "$REPO" \
              --description 'blocked on a Crom product decision' --color 5319E7 2>/dev/null || true
            gh issue edit "$NUM" -R "$REPO" --add-label crom-decision
            mkdir -p "$HOME/crom-queue/pending"
            {
              printf '# RC decision needed — %s: refusal has no dev clearance path\n' "$DOMAIN"
              printf '_Decide, land the outcome on %s-dev, then close the loop issue (auto re-cut). A clean cut clears this card._\n\n' "$DOMAIN"
              printf '%s\n\n' "$REASONS"
              printf 'Loop issue: %s\nRun: %s\n' "$ISSUE_URL" "$RUN_URL"
            } > "$HOME/crom-queue/pending/RC-DECISION-$DOMAIN.md"
          fi

          {
            printf 'To: crom@tysonx.ie\n'
            printf 'From: crom@tysonx.ie\n'
            printf 'Auto-Submitted: auto-generated\n'
            printf 'Subject: [RC] %s REFUSED — reasons looped to dev as an issue\n\n' "$DOMAIN"
            printf 'The RC finalise for %s was refused. No candidate exists; the slot is unchanged.\n\n' "$DOMAIN"
            printf 'Why (gate errors):\n%s\n\n' "$REASONS"
            printf 'Loop issue (fix on dev, close = auto re-cut):\n  %s\n\n' "$ISSUE_URL"
            printf 'Board: cicd rc %s\n' "$DOMAIN"
            printf 'Run:   %s\n' "$RUN_URL"
          } | /usr/sbin/sendmail -f crom@tysonx.ie -t
