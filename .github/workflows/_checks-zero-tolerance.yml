# _checks-zero-tolerance.yml — CICD v2 step 3 (C178289477824693)
# Reusable dev-stage zero-tolerance gate. THIN YAML over the FAT bash spine: the
# code-quality verdict (dotnet build with CS/IDE/CA/SA incl. CS1591 as hard errors,
# plus the comment-density heuristic) is produced by ONE entry point — cicd/checks.sh
# — driven by the central domains.yml registry, so per-repo gate copies cannot drift.
# The YAML only wires triggers, checks out code, runs tests for coverage, and calls
# the deterministic bash checks (diff-coverage, retry-tracker). Zero AI at runtime.
#
# Called by a domain repo`s own thin ci.yml via workflow_call, on pull_request only
# (retry-tracker needs a PR). Wired live into lodgers (checks.yml + dev-automerge.yml,
# merged lodgers#280). kukuln/tysonx remain on-hold/stub in domains.yml until active.

on:
  workflow_call:
    inputs:
      domain:
        description: "domains.yml key (e.g. lodgers) — selects the app project/dirs/base the gate builds"
        required: true
        type: string
      test_project:
        description: "test project/solution to run for coverage; empty = skip test+diff-coverage for this domain"
        required: false
        type: string
        default: ""
      scope:
        description: "'diff' (changed .cs vs the domain dev_base) or 'whole' (day-1 cleanup)"
        required: false
        type: string
        default: diff
      min_comment_ratio:
        description: "comment/code floor for the advisory comment-density check"
        required: false
        type: number
        default: 0.10
      min_diff_coverage:
        required: false
        type: number
        default: 80
      min_total_coverage:
        description: "floor for TOTAL product line coverage (ratchet toward 100); 0 = report-only"
        required: false
        type: number
        default: 0
      retry_limit:
        required: false
        type: number
        default: 10
      strict_density:
        description: "make comment-density findings gate-failing (default: advisory, non-blocking)"
        required: false
        type: boolean
        default: false

# Concurrency: PER-PR group (was a single constant group = 1 run fleet-wide, which made
# concurrent PR triggers cancel each other's pending run — a throughput floor and a
# frequent "no movement" stall). Per-ref lets DISTINCT PRs run concurrently, bounded to
# 2 by the two [self-hosted, tysonx-dev] runners; re-pushes to the SAME PR still queue
# (cancel-in-progress:false, GitHub depth-1). CAVEAT: the test step is --no-build (skips
# the dev build-mutex), so two suites share the 8 cores and each runs slower — the step
# and job timeouts below are raised to absorb that so CPU-shared runs don't blow the
# clock. Real throughput gain is modest (CPU-bound); the durable lever is more compute
# (a 3rd runner) or a faster coverage path. Reap coverage orphans + auto-cancel wedged
# runs out-of-band (dotnet-coverage hard-hangs the testhost when killed under timeout).
concurrency:
  group: zero-tolerance-tysonx-dev-${{ github.repository }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

jobs:
  zero-tolerance:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, tysonx-dev]
    # 60 (was 40): with per-PR concurrency two suites can share the box; a CPU-shared
    # instrumented run is slower, so the job cap is raised to keep it off the clock.
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout product repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # The spine (checks.sh + lib/*.sh + domains.yml) is versioned in ci-templates.
      # Pin to main: the feature branch that introduced these scripts is deleted after
      # merge, so a self-referential feature-branch ref would break every caller. When
      # a v1 release branch/tag is cut, track that instead.
      - name: Checkout ci-templates spine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: TysonX-Teoranta/ci-templates
          ref: main
          path: .ci-templates

      - name: Zero-tolerance code-quality gate (checks.sh — build + analyzers + comment-density)
        id: gate
        env:
          CICD_MIN_COMMENT_RATIO: ${{ inputs.min_comment_ratio }}
        run: |
          chmod +x .ci-templates/cicd/checks.sh .ci-templates/cicd/lib/*.sh
          args=(--domain "${{ inputs.domain }}" --repo-root "$GITHUB_WORKSPACE" \
                --scope "${{ inputs.scope }}" --base "origin/${{ github.base_ref }}")
          [ "${{ inputs.strict_density }}" = "true" ] && args+=(--strict-density)
          .ci-templates/cicd/checks.sh "${args[@]}"

      - name: Test + coverage
        id: test
        if: inputs.test_project != ''
        # The instrumented (dotnet-coverage collect) suite legitimately grew past the
        # old 15-min cap as the test count climbed (lodgers ~449 tests, ~12-15 min
        # under coverage on the arm64 runner), so green PRs were failing on the clock,
        # not on a defect. 50 (was 30): under per-PR concurrency two suites can share the
        # box and run slower, so the cap is raised to keep CPU-shared runs green; the
        # 8-min per-test blame-hang timeout below still catches a genuinely wedged test.
        timeout-minutes: 50
        run: |
          # Coverage on this linux-arm64 self-hosted runner needs STATIC managed
          # instrumentation. Both profiler-based collectors are broken here:
          # coverlet's in-process collector hard-hangs the test host (runs
          # 28599505994/28600866064), and dotnet-coverage's default DYNAMIC mode
          # exits 0 but never attaches ("Profiler was not initialized") — it
          # writes an EMPTY cobertura (<packages/>), silently scoring every code
          # PR 0% diff-coverage (lodgers #294, runs 28705935323/28708127047).
          # So: build once, rewrite the repo's product assemblies in the test
          # output with `dotnet-coverage instrument`, run the tests --no-build
          # under a collect session with the same session id (no profiler
          # involved), and fail LOUDLY if the report ever comes back empty.
          # Proven on this runner: the commit dynamic mode scored 0% scores 90.9%.
          dotnet tool install --global dotnet-coverage
          export PATH="$PATH:$HOME/.dotnet/tools"
          mkdir -p ./coverage
          dotnet build "${{ inputs.test_project }}" -c Debug
          SESSION="zt-${{ github.run_id }}"
          TEST_BIN="$(dirname "${{ inputs.test_project }}")/bin/Debug"
          [ -d "$TEST_BIN" ] || TEST_BIN="."
          # product assemblies = this repo's non-test projects' OUTPUT names;
          # instrument their copies in the test output (what the tests load).
          # The output name is <AssemblyName> when the csproj sets one (tysonx:
          # TysonxSite.csproj -> tysonx-site.dll; matching on csproj basenames
          # instrumented NOTHING there and the empty-report guard killed the PR),
          # falling back to the csproj basename when it doesn't.
          PRODUCT_RE="$(find . -name '*.csproj' -not -path '*/bin/*' -not -path '*/obj/*' \
            | grep -viE '/[^/]*tests?\.csproj$' \
            | while IFS= read -r proj; do
                name="$(sed -n 's:.*<AssemblyName>[[:space:]]*\([^<]*[^<[:space:]]\)[[:space:]]*</AssemblyName>.*:\1:p' "$proj" | head -1)"
                echo "${name:-$(basename "$proj" .csproj)}"
              done \
            | sed 's|[.[\*^$+?{}()|]|\\&|g' | paste -sd'|')"
          if [ -n "$PRODUCT_RE" ]; then
            find "$TEST_BIN" -path "*/bin/Debug/*" -name "*.dll" \
              | grep -E "/(${PRODUCT_RE})\.dll$" \
              | while IFS= read -r dll; do
                  dotnet-coverage instrument --session-id "$SESSION" \
                    --output "$dll.inst" "$dll" && mv "$dll.inst" "$dll"
                done
          fi
          dotnet-coverage collect --session-id "$SESSION" \
            "dotnet test \"${{ inputs.test_project }}\" --no-build --blame-hang-timeout 8m --blame-hang-dump-type mini --diag ./coverage/diag.log" \
            --output ./coverage/coverage.cobertura.xml --output-format cobertura \
            2>&1 | tee test-report.txt
          test "${PIPESTATUS[0]}" -eq 0
          # empty-report guard: instrumentation regressions must fail here, not
          # as a misleading 0% in the diff-coverage gate
          python3 - <<'PY'
          import sys, xml.etree.ElementTree as ET
          root = ET.parse("./coverage/coverage.cobertura.xml").getroot()
          if not any(True for _ in root.iter("class")):
              print("::error::coverage report is EMPTY — instrumentation collected nothing")
              sys.exit(1)
          PY

      - name: Diff-coverage gate (>= min_diff_coverage% of changed lines)
        id: diffcov
        if: inputs.test_project != ''
        run: |
          COBERTURA=$(find ./coverage -name "coverage.cobertura.xml" | head -1)
          .ci-templates/cicd/lib/diff-coverage.sh --cobertura "$COBERTURA" \
            --min "${{ inputs.min_diff_coverage }}" --base "origin/${{ github.base_ref }}" -v

      # Total-coverage floor. Runs even at min 0 so every PR's log carries the
      # whole-codebase number + worst-offender list — the ratchet's evidence trail.
      - name: Full-coverage gate (total line coverage >= min_total_coverage%)
        id: fullcov
        if: inputs.test_project != ''
        run: |
          COBERTURA=$(find ./coverage -name "coverage.cobertura.xml" | head -1)
          .ci-templates/cicd/lib/full-coverage.sh --cobertura "$COBERTURA" \
            --min "${{ inputs.min_total_coverage }}" -v

      - name: Attach failure report
        if: failure()
        run: |
          echo "## Zero-tolerance gate failed" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          { tail -100 .ci-templates/cicd/reports/findings.txt 2>/dev/null || true; \
            tail -100 test-report.txt 2>/dev/null || true; } >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Retry-tracker — record result, elevate at limit
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GATE: ${{ steps.gate.outcome }}
          TEST: ${{ steps.test.outcome }}
          DIFFCOV: ${{ steps.diffcov.outcome }}
          FULLCOV: ${{ steps.fullcov.outcome }}
        run: |
          # Record only real verdicts. If the gate never ran (checkout/setup died →
          # outcome skipped/cancelled) there is no code verdict, and an infra death
          # must not consume the rework budget toward step3-elevate.
          if [ "$GATE" = "failure" ] || [ "$TEST" = "failure" ] || [ "$DIFFCOV" = "failure" ] || [ "$FULLCOV" = "failure" ]; then
            RESULT="fail"
          elif [ "$GATE" = "success" ]; then
            RESULT="pass"
          else
            echo "retry-tracker: gate did not run (gate=$GATE) — infra failure, not recording."
            exit 0
          fi
          .ci-templates/cicd/lib/retry-tracker.sh --pr "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --result "$RESULT" --limit "${{ inputs.retry_limit }}" -v
