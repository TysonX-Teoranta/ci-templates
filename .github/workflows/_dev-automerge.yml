# _dev-automerge.yml — TysonX-Teoranta CI/CD reusable: deterministic, zero-AI-at-runtime
# auto-merge for dev-branch PRs (contract C178289477824693).
#
# Called by each domain repo's own workflow_run-triggered caller (see dev-automerge.yml
# in lodgers/tysonx/kukuln) once that repo's real CI workflow completes. Never invoked
# directly on pull_request — a PR-triggered job cannot safely await its own check list
# (it would be waiting on itself), so activation is deliberately routed through the CI
# workflow's completion event instead.
#
# Hard floor (never merges): non-open PRs, drafts, Release/Promote-titled PRs (TOTP/human
# promotion gates), hold-titled PRs (WIP / HOLD / DO NOT MERGE — proven live: PR
# lodgers#285 titled "DO NOT MERGE" was auto-merged before this filter existed),
# any base branch that isn't literally *-dev (ALLOWLIST, not a
# staging/live denylist — a PR targeting main or anything else is out of scope by
# default), unmergeable (conflicted) PRs, PRs with any check not yet passing. No
# branch-protection dependency — this job IS the gate.
#
# Behind-base handling: a green PR whose head is behind its base (blocked by the
# strict up-to-date protection rule) is brought up to date via the update-branch API
# under AUTOMERGE_PAT; the re-run checks re-invoke this job, which then merges. No
# human step anywhere on the green path.
name: _dev-automerge

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'Pull request number to evaluate for auto-merge'
        required: true
        type: number
    secrets:
      AUTOMERGE_PAT:
        description: >-
          PAT with contents+pull-requests write, used ONLY for the update-branch call
          when a green PR is behind its base. The built-in github.token cannot be used
          there: events it causes never trigger workflows, so the re-run of checks on
          the updated head would not fire and the PR would stall on the up-to-date
          protection rule forever.
        required: false

permissions:
  contents: write
  pull-requests: write
  # Without checks:read an explicit permissions block strips it from GITHUB_TOKEN and
  # the check-runs read below 403s ("Resource not accessible by integration") — which,
  # combined with the old append-style fallback, deadlocked every merge (tysonx#84).
  # Callers must grant it too: a reusable cannot exceed its caller's grant.
  checks: read

jobs:
  automerge:
    name: Auto-merge if green and in-scope
    runs-on: [self-hosted, tysonx-dev]
    steps:
      - name: Evaluate and merge
        env:
          GH_TOKEN: ${{ github.token }}
          AUTOMERGE_PAT: ${{ secrets.AUTOMERGE_PAT }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          # Bring a green-but-behind PR up to date with its base. Must run under the
          # PAT, not github.token (see the secret's description); the resulting
          # synchronize event re-runs checks, whose completion re-invokes this job.
          update_branch() {
            if [ -z "${AUTOMERGE_PAT:-}" ]; then
              echo "SKIP: PR is behind its base and no AUTOMERGE_PAT secret is available to update it — leaving for manual update."
              return 0
            fi
            echo "PR #$PR is behind $base — updating the branch; checks re-run on the new head and automerge re-evaluates when they complete."
            GH_TOKEN="$AUTOMERGE_PAT" gh api -X PUT "repos/${REPO}/pulls/${PR}/update-branch" >/dev/null
          }

          pr_json=$(gh pr view "$PR" --repo "$REPO" --json title,baseRefName,isDraft,mergeable,state,headRefOid)
          title=$(jq -r .title <<<"$pr_json")
          base=$(jq -r .baseRefName <<<"$pr_json")
          draft=$(jq -r .isDraft <<<"$pr_json")
          mergeable=$(jq -r .mergeable <<<"$pr_json")
          state=$(jq -r .state <<<"$pr_json")
          head_sha=$(jq -r .headRefOid <<<"$pr_json")

          echo "PR #$PR: title='$title' base='$base' draft=$draft mergeable=$mergeable state=$state"

          if [ "$state" != "OPEN" ]; then
            echo "SKIP: PR is not open ($state)."
            exit 0
          fi
          if [ "$draft" = "true" ]; then
            echo "SKIP: draft PR."
            exit 0
          fi
          if printf '%s' "$title" | grep -qiE 'release|promote'; then
            echo "SKIP: Release/Promote-titled PR — human/TOTP gate, never auto-merged."
            exit 0
          fi
          # Human hold markers. Draft status is the primary hold; the title marker is a
          # backstop so a plain-English "DO NOT MERGE" is honoured too (lodgers#285).
          if printf '%s' "$title" | grep -qiE 'do[ _-]?not[ _-]?merge|\bwip\b|\bhold\b'; then
            echo "SKIP: hold-titled PR (DO NOT MERGE / WIP / HOLD) — never auto-merged."
            exit 0
          fi
          case "$base" in
            *-dev)
              : # in-scope dev branch — continue
              ;;
            *)
              echo "SKIP: base branch ($base) is not a *-dev branch — allowlist, not denylist (never auto-merge to main/staging/live/anything else by default)."
              exit 0
              ;;
          esac
          if [ "$mergeable" != "MERGEABLE" ]; then
            echo "FLAG (not forced): PR is not cleanly mergeable (mergeable=$mergeable) — likely a conflict. Leaving for manual resolution."
            exit 0
          fi

          # `gh pr checks` reads the GraphQL statusCheckRollup, which lags the
          # workflow_run completion event unpredictably (observed live,
          # C178289477824693 proof: a 10x/6s=60s retry against it still read zero
          # checks minutes after both checks had actually gone green). The REST
          # check-runs API (queried by exact head SHA, not the PR's rollup) reflects
          # each check the instant it posts its conclusion — same surface GitHub
          # itself uses to render the PR checks tab — so read that directly instead.
          # --paginate with --jq '.check_runs' emits one array PER PAGE (concatenated
          # JSON docs, not one array) — downstream jq then mis-indexes and the counts
          # go garbage (observed live: lodgers#292 read "0/3 checks passing" as green).
          # Stream elements and re-slurp into a single array instead.
          # Gate on the REQUIRED contexts only (what branch protection actually
          # blocks a merge on). A failing non-required check must not stall the
          # dev lane: GitHub's Automatic Dependency Submission red-flagged every
          # lodgers PR (component-detection has no linux-arm64 build) and automerge
          # deadlocked on green-gated PRs (lodgers#305/#306, 2026-07-04). If the
          # protection read fails, fall back to gating on ALL checks (conservative).
          required_json=$(gh api "repos/${REPO}/branches/${base}/protection/required_status_checks" --jq '[.contexts[]]' 2>/dev/null) || required_json=""
          jq -e 'type == "array" and length > 0' >/dev/null 2>&1 <<<"$required_json" || required_json=""
          if [ -n "$required_json" ]; then
            echo "gating on required contexts only: $(jq -r 'join(", ")' <<<"$required_json")"
          else
            echo "could not read required contexts — gating on ALL check-runs (conservative fallback)."
          fi

          total_checks=0 not_done=1 not_success=1
          for attempt in $(seq 1 10); do
            # Fallback REPLACES, never appends: the old `|| echo "[]"` CONCATENATED
            # "[]" onto partial output whenever gh exited non-zero despite emitting
            # data, making every count below multiline and the green condition
            # unsatisfiable — automerge deadlocked on a fully green PR (tysonx#84,
            # 2026-07-04). gh stderr is left visible in the log on purpose.
            raw=$(gh api "repos/${REPO}/commits/${head_sha}/check-runs" --paginate --jq '.check_runs[]' | jq -s '.') || raw=""
            jq -e 'type == "array"' >/dev/null 2>&1 <<<"$raw" || raw="[]"
            # A workflow_run-triggered run reports its check-runs on the SAME head SHA
            # as the PR, so this run (and any sibling automerge run) must be excluded
            # from the gate count — counting them is waiting on ourselves.
            runs_json=$(jq '[.[] | select((.name | startswith("automerge /") or startswith("Resolve PR number")) | not)]' <<<"$raw")
            # Required-only gate: keep just the check-runs whose name is a
            # protected context (names match exactly, e.g. "checks / zero-tolerance").
            if [ -n "$required_json" ]; then
              runs_json=$(jq --argjson req "$required_json" '[.[] | select(.name as $n | $req | index($n))]' <<<"$runs_json")
            fi
            total_checks=$(jq -r 'length' <<<"$runs_json")
            not_done=$(jq -r '[.[] | select(.status != "completed")] | length' <<<"$runs_json")
            not_success=$(jq -r '[.[] | select(.conclusion != "success")] | length' <<<"$runs_json")
            if [ "$total_checks" != "0" ] && [ "$not_done" = "0" ] && [ "$not_success" = "0" ]; then
              break
            fi
            echo "attempt $attempt/10: total_checks=$total_checks not_done=$not_done not_success=$not_success — retrying in 8s"
            sleep 8
          done

          if [ "$total_checks" = "0" ]; then
            echo "SKIP: no check-runs reported after 10 retries (~80s) — nothing to gate on."
            exit 0
          fi
          if [ "$not_done" != "0" ] || [ "$not_success" != "0" ]; then
            echo "SKIP: $not_done not-completed / $not_success not-success check-run(s) after 10 retries (~80s)."
            exit 0
          fi

          # Green, but the up-to-date protection rule (strict checks) still blocks a
          # merge when the head is behind its base — the exact halt seen live on
          # lodgers#292. Update the branch and let the next checks cycle merge it.
          merge_state=$(gh pr view "$PR" --repo "$REPO" --json mergeStateStatus --jq .mergeStateStatus)
          if [ "$merge_state" = "BEHIND" ]; then
            update_branch
            exit 0
          fi

          echo "All conditions met (open, non-draft, non-release/promote, dev-branch base, mergeable, $total_checks/$total_checks checks passing) — merging PR #$PR."
          if ! gh pr merge "$PR" --repo "$REPO" --squash --delete-branch=false; then
            # Base may have advanced between evaluation and merge (race). Re-read the
            # state: if we merely fell behind, update the branch and let the next
            # cycle merge; anything else is a genuine failure.
            merge_state=$(gh pr view "$PR" --repo "$REPO" --json mergeStateStatus --jq .mergeStateStatus)
            if [ "$merge_state" = "BEHIND" ]; then
              update_branch
              exit 0
            fi
            echo "Merge failed and PR is not merely behind (mergeStateStatus=$merge_state)."
            exit 1
          fi
