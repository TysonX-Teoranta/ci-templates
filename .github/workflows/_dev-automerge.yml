# _dev-automerge.yml — TysonX-Teoranta CI/CD reusable: deterministic, zero-AI-at-runtime
# auto-merge for dev-branch PRs (contract C178289477824693).
#
# Called by each domain repo's own workflow_run-triggered caller (see dev-automerge.yml
# in lodgers/tysonx/kukuln) once that repo's real CI workflow completes. Never invoked
# directly on pull_request — a PR-triggered job cannot safely await its own check list
# (it would be waiting on itself), so activation is deliberately routed through the CI
# workflow's completion event instead.
#
# Hard floor (never merges): non-open PRs, drafts, Release/Promote-titled PRs (TOTP/human
# promotion gates), any base branch that isn't literally *-dev (ALLOWLIST, not a
# staging/live denylist — a PR targeting main or anything else is out of scope by
# default), unmergeable (conflicted) PRs, PRs with any check not yet passing. No
# branch-protection dependency — this job IS the gate.
name: _dev-automerge

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'Pull request number to evaluate for auto-merge'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Auto-merge if green and in-scope
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate and merge
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          pr_json=$(gh pr view "$PR" --repo "$REPO" --json title,baseRefName,isDraft,mergeable,state,headRefOid)
          title=$(jq -r .title <<<"$pr_json")
          base=$(jq -r .baseRefName <<<"$pr_json")
          draft=$(jq -r .isDraft <<<"$pr_json")
          mergeable=$(jq -r .mergeable <<<"$pr_json")
          state=$(jq -r .state <<<"$pr_json")
          head_sha=$(jq -r .headRefOid <<<"$pr_json")

          echo "PR #$PR: title='$title' base='$base' draft=$draft mergeable=$mergeable state=$state"

          if [ "$state" != "OPEN" ]; then
            echo "SKIP: PR is not open ($state)."
            exit 0
          fi
          if [ "$draft" = "true" ]; then
            echo "SKIP: draft PR."
            exit 0
          fi
          if printf '%s' "$title" | grep -qiE 'release|promote'; then
            echo "SKIP: Release/Promote-titled PR — human/TOTP gate, never auto-merged."
            exit 0
          fi
          case "$base" in
            *-dev)
              : # in-scope dev branch — continue
              ;;
            *)
              echo "SKIP: base branch ($base) is not a *-dev branch — allowlist, not denylist (never auto-merge to main/staging/live/anything else by default)."
              exit 0
              ;;
          esac
          if [ "$mergeable" != "MERGEABLE" ]; then
            echo "FLAG (not forced): PR is not cleanly mergeable (mergeable=$mergeable) — likely a conflict. Leaving for manual resolution."
            exit 0
          fi

          # `gh pr checks` reads the GraphQL statusCheckRollup, which lags the
          # workflow_run completion event unpredictably (observed live,
          # C178289477824693 proof: a 10x/6s=60s retry against it still read zero
          # checks minutes after both checks had actually gone green). The REST
          # check-runs API (queried by exact head SHA, not the PR's rollup) reflects
          # each check the instant it posts its conclusion — same surface GitHub
          # itself uses to render the PR checks tab — so read that directly instead.
          total_checks=0 not_done=1 not_success=1
          for attempt in $(seq 1 10); do
            runs_json=$(gh api "repos/${REPO}/commits/${head_sha}/check-runs" --paginate --jq '.check_runs' 2>/dev/null || echo "[]")
            total_checks=$(jq -r 'length' <<<"$runs_json")
            not_done=$(jq -r '[.[] | select(.status != "completed")] | length' <<<"$runs_json")
            not_success=$(jq -r '[.[] | select(.conclusion != "success")] | length' <<<"$runs_json")
            if [ "$total_checks" != "0" ] && [ "$not_done" = "0" ] && [ "$not_success" = "0" ]; then
              break
            fi
            echo "attempt $attempt/10: total_checks=$total_checks not_done=$not_done not_success=$not_success — retrying in 8s"
            sleep 8
          done

          if [ "$total_checks" = "0" ]; then
            echo "SKIP: no check-runs reported after 10 retries (~80s) — nothing to gate on."
            exit 0
          fi
          if [ "$not_done" != "0" ] || [ "$not_success" != "0" ]; then
            echo "SKIP: $not_done not-completed / $not_success not-success check-run(s) after 10 retries (~80s)."
            exit 0
          fi

          echo "All conditions met (open, non-draft, non-release/promote, dev-branch base, mergeable, $total_checks/$total_checks checks passing) — merging PR #$PR."
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch=false
